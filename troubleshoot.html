    <style>
        :root { --bg-color: #121212; --card-bg: #1e1e1e; --text-main: #e0e0e0; --text-muted: #888; --accent: #00FF00; --danger: #ff5555; --info: #4fc3f7; --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; --font-pixel: 'VT323', monospace; }

        .category-card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        .category-icon { font-size: 3rem; margin-bottom: 15px; }
        .category-title { font-family: var(--font-pixel); font-size: 1.8rem; color: var(--accent); margin-bottom: 10px; }
        .category-desc { font-size: 0.9rem; color: #bbb; line-height: 1.4; }
        .wizard-container { display: none; background: var(--card-bg); border: 1px solid #2a2a2a; border-radius: 16px; padding: 40px; margin-bottom: 30px; }
        .wizard-container.active { display: block; }
        .progress-bar { background: #2a2a2a; height: 6px; border-radius: 3px; margin-bottom: 30px; overflow: hidden; }
        .progress-fill { background: var(--accent); height: 100%; width: 0%; transition: width 0.3s ease; }
        .question { display: none; animation: fadeIn 0.3s ease; } .question.active { display: block; }

        .question-title { font-family: var(--font-pixel); font-size: 2rem; color: var(--accent); margin-bottom: 15px; }
        .question-subtitle { font-size: 0.95rem; color: #bbb; margin-bottom: 30px; }
        .options { display: flex; flex-direction: column; gap: 15px; }

        .solution-title { font-family: var(--font-pixel); font-size: 2.5rem; color: var(--accent); margin-bottom: 20px; }
        .solution-section { margin-bottom: 30px; }
        .solution-section h3 { font-family: var(--font-pixel); font-size: 1.5rem; color: var(--info); margin-bottom: 15px; }
        .solution-step { background: #1a1a1a; padding: 15px 20px; border-left: 3px solid var(--accent); margin-bottom: 15px; border-radius: 4px; }
        .cmd-box { background: #000; border: 1px solid var(--accent); border-radius: 8px; padding: 15px 20px; margin: 10px 0; font-family: 'Courier New', monospace; font-size: 0.95rem; color: var(--accent); cursor: pointer; transition: all 0.2s; position: relative; word-break: break-all; }
        .cmd-box:hover { box-shadow: 0 0 15px rgba(0, 255, 0, 0.2); border-color: #fff; }
        .cmd-box::after { content: '[CLICK TO COPY]'; position: absolute; right: 15px; top: 50%; transform: translateY(-50%); font-family: var(--font-pixel); font-size: 0.8rem; color: #555; pointer-events: none; }
        .cmd-box.copied::after { content: '[COPIED!]'; color: var(--accent); }
        .config-example { background: #000; border: 1px solid #444; border-radius: 8px; padding: 20px; margin: 15px 0; font-family: 'Courier New', monospace; font-size: 0.9rem; color: #ddd; overflow-x: auto; white-space: pre; line-height: 1.6; }
        .warning-box { background: rgba(255, 85, 85, 0.1); border: 1px solid var(--danger); border-radius: 8px; padding: 15px 20px; margin: 15px 0; color: #ffaaaa; }
        .critical-warning { background: rgba(255, 0, 0, 0.2); border: 2px solid #ff0000; border-radius: 8px; padding: 20px; margin: 15px 0; color: #ff6666; font-weight: bold; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 5px rgba(255, 0, 0, 0.5); } 50% { box-shadow: 0 0 20px rgba(255, 0, 0, 0.8); } }
        .info-box { background: rgba(79, 195, 247, 0.1); border: 1px solid var(--info); border-radius: 8px; padding: 15px 20px; margin: 15px 0; color: #aaddff; }
        .link-box { background: rgba(0, 255, 0, 0.1); border: 1px solid var(--accent); border-radius: 8px; padding: 15px 20px; margin: 15px 0; }
        .link-box a { color: var(--accent); text-decoration: underline; font-weight: 500; } .link-box a:hover { color: #fff; }
        .display-selector { background: #1a1a1a; border: 1px solid #333; padding: 15px; border-radius: 8px; margin: 15px 0; }
        .display-selector select { width: 100%; background: #000; border: 1px solid var(--accent); color: var(--accent); padding: 12px; border-radius: 4px; font-family: var(--font-pixel); font-size: 1.2rem; cursor: pointer; }
        .display-config-output { margin-top: 15px; display: none; } .display-config-output.active { display: block; }
        .help-footer { margin-top: 60px; text-align: center; padding: 30px; background: var(--card-bg); border-radius: 16px; border: 1px solid #2a2a2a; }
        .help-footer h3 { font-family: var(--font-pixel); font-size: 2rem; color: var(--accent); margin-bottom: 20px; }
        .help-footer p { color: #bbb; margin-bottom: 20px; }
        .social-links { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .social-link { font-family: var(--font-pixel); font-size: 1.3rem; color: var(--text-muted); border: 1px solid #333; padding: 8px 16px; border-radius: 4px; transition: all 0.2s; background: #1a1a1a; }
        .social-link:hover { color: #000; background: var(--accent); border-color: var(--accent); transform: translateY(-2px); }
        @media (max-width: 768px) { h1 { font-size: 3rem; } .question-title { font-size: 1.6rem; } .solution-title { font-size: 2rem; } .category-grid { grid-template-columns: 1fr; } .wizard-container { padding: 25px; } .cmd-box::after { display: none; } }
    </style>

        const troubleshootData = {"categories":[{"id":"connection","icon":"🔌","title":"Connection Issues","description":"Can't connect via SSH or USB","tree":[{"question":"What version of Pwnagotchi are you running?","subtitle":"Check your image release version","options":[{"label":"2.9.5.4 or newer","next":1},{"label":"Pre-2.9.5.4 (older)","next":2},{"label":"Not sure","solution":"check-version"}]},{"question":"How are you trying to connect?","options":[{"label":"USB (Windows/Mac/Linux)","next":3},{"label":"Ethernet cable (Pi 4/5)","solution":"ethernet-new"},{"label":"Already connected, other issue","solution":"general"}]},{"question":"How are you trying to connect (Pre-2.9.5.4)?","options":[{"label":"USB (Windows/Mac/Linux)","next":4},{"label":"Ethernet cable (Pi 4/5)","solution":"ethernet-old"},{"label":"Already connected, other issue","solution":"general"}]},{"question":"What's your computer OS? (v2.9.5.4+)","options":[{"label":"Windows","solution":"windows-new"},{"label":"Mac","solution":"mac-new"},{"label":"Linux","solution":"linux-new"}]},{"question":"What's your computer OS? (Pre-2.9.5.4)","options":[{"label":"Windows","solution":"windows-old"},{"label":"Mac","solution":"mac-old"},{"label":"Linux","solution":"linux-old"}]}],"solutions":{"check-version":{"title":"Check Your Pwnagotchi Version","steps":["Check the filename of the image you downloaded","Or SSH in and run: sudo pwnagotchi --version"],"commands":["sudo pwnagotchi --version"],"info":["v2.9.5.4+ uses easier connection (hostname.local)","Older versions use IP addresses (10.0.0.2)","Download latest: https://github.com/jayofelony/pwnagotchi/releases","v2.9.5.5+: AI removed, auto-tune replaces it. Handshakes in /etc/pwnagotchi/handshakes"]},"windows-new":{"title":"Windows USB Connection (v2.9.5.4+)","steps":["Connect Pwnagotchi via USB (port closest to HDMI for Zero/Zero2W, USB-C for Pi4/5)","Download and install RPi USB Gadget driver from the wiki","Wait 2-3 minutes for first boot","Open PowerShell or ofelony/pwnagotchi/wiki/Step-2-Connecting#linux"}],"warnings":["⚠️ CRITICAL: NEVER run 'sudo apt-get upgrade' (breaks Pwnagotchi!) ✅ OK: 'sudo apt-get update'","First boot takes 2-3 minutes"]},"windows-old":{"title":"Windows USB Connection (Pre-2.9.5.4)","steps":["Connect Pwnagotchi via USB","Download and install RNDIS driver (old method)","Open Device Manager → Find 'USB Ethernet/RNDIS Gadget'","Right-click → Properties → TCP/IPv4","Set IP: 10.0.0.1, Subnet: 255.255.255.0","Open PowerShell","Type: ssh pi@10.0.0.2","Enter password: raspberry"],"commands":["ssh pi@10.0.0.2"],"warnings":["⚠️ CRITICAL: NEVER run 'sudo apt-get upgrade' (breaks Pwnagotchi!) ✅ OK: 'sudo apt-get update'","This is the OLD method - upgrade to v2.9.5.4+ for easier setup"],"info":["Default: ssh pi@10.0.0.2","Password: raspberry"],"links":[{"text":"Download RNDIS Driver (Old Method)","url":"https://modclouddownloadprod.blob.core.windows.net/shared/mod-rndis-driver-windows.zip"}]},"mac-old":{"title":"Mac USB Connection (Pre-2.9.5.4)","steps":["This is the old RNDIS method","Newer images (2.9.5.4+) are much easier!","Consider upgrading your image","For old method: manually set IP 10.0.0.1 on RNDIS interface","Then: ssh pi@10.0.0.2"],"commands":["ssh pi@10.0.0.2"],"warnings":["⚠️ CRITICAL: NEVER run 'sudo apt-get upgrade' (breaks Pwnagotchi!) ✅ OK: 'sudo apt-get update'","Upgrade to v2.9.5.4+ for much easier setup"],"info":["Default: ssh pi@10.0.0.2","Password: raspberry"]},"linux-old":{"title":"Linux USB Connection (Pre-2.9.5.4)","steps":["This uses the old connection sharing script method","Download: wget https://raw.githubusercontent.com/jayofelony/pwnagotchi/master/scripts/linux_connection_share.sh","Make executable: sudo chmod +x linux_connection_share.sh","Run: sudo ./linux_connection_share.sh","SSH: ssh pi@10.0.0.2"],"commands":["wget https://raw.githubusercontent.com/jayofelony/pwnagotchi/master/scripts/linux_connection_share.sh","sudo chmod +x linux_connection_share.sh","sudo ./linux_connection_share.sh","ssh pi@10.0.0.2"],"warnings":["⚠️ CRITICAL: NEVER run 'sudo apt-get upgrade' (breaks Pwnagotchi!) ✅ OK: 'sudo apt-get update'","Upgrade to v2.9.5.4+ for easier setup"],"info":["Default: ssh pi@10.0.0.2","Password: raspberry"]},"ethernet-new":{"title":"Ethernet Connection (Pi 4/5)","steps":["Connect ethernet cable to your router/modem","Wait 2 minutes for boot and DHCP","SSH: ssh pi@pwnagotchi.local","Or find IP in router and use: ssh pi@<IP_ADDRESS>"],"commands":["ssh pi@pwnagotchi.local","ssh pi@<IP_of_your_pwn>"],"info":["Ethernet only works on Pi 3, 4, and 5","Default hostname: pwnagotchi.local","✅ OK to run: sudo apt-get update"],"warnings":["⚠️ CRITICAL: NEVER run 'sudo apt-get upgrade' (breaks Pwnagotchi!) ✅ OK: 'sudo apt-get update'"]},"ethernet-old":{"title":"Ethernet Connection (Old Images)","steps":["Connect ethernet cable","Check router for device IP","SSH: ssh pi@<IP_ADDRESS>"],"commands":["ssh pi@<IP_ADDRESS>"],"warnings":["⚠️ CRITICAL: NEVER run 'sudo apt-get upgrade' (breaks Pwnagotchi!) ✅ OK: 'sudo apt-get update'"],"info":["✅ OK to run: sudo apt-get update"]},"general":{"title":"General Connection Help","info":["v2.9.5.4+: ssh pi@pwnagotchi.local","Old versions: ssh pi@10.0.0.2","Password: raspberry","First boot: 2-3 minutes","Use a DATA cable","⚠️ NEVER run 'sudo apt-get upgrade' ✅ OK: 'sudo apt-get update'"],"links":[{"text":"Official Wiki Connection Guide","url":"https://github.com/jayofelony/pwnagotchi/wiki/Step-2-Connecting"}]}}},{"id":"config","icon":"⚙️","title":"Configuration","description":"Config file, plugin setup, external WiFi","tree":[{"question":"What do you need help with?","options":[{"label":"How to create/edit config.toml","solution":"edit-config"},{"label":"What does a config option do?","next":1},{"label":"Plugin won't enable","next":2},{"label":"Config syntax errors","solution":"syntax-errors"},{"label":"Using external WiFi adapter","next":3}]},{"question":"Which config option?","options":[{"label":"whitelist (network names/MACs)","solution":"config-whitelist"},{"label":"personality settings","solution":"config-personality"},{"label":"display settings","solution":"config-display"},{"label":"Other / general help","solution":"config-options"}]},{"question":"Is the plugin line in config.toml?","options":[{"label":"Yes, with 'enabled = true'","solution":"plugin-restart"},{"label":"Yes, but not enabled","solution":"plugin-enable"},{"label":"Not in config","solution":"plugin-add"}]},{"question":"Which Raspberry Pi are you using?","subtitle":"Pi Zero and Pi Zero 2 use the same config","options":[{"label":"Pi Zero / Pi Zero 2","solution":"external-pi0"},{"label":"Pi 3","solution":"external-pi3"},{"label":"Pi 4","solution":"external-pi4"},{"label":"Pi 5","solution":"external-pi5"}]}],"solutions":{"edit-config":{"title":"Create and Edit Config File","steps":["SSH into your Pwnagotchi","Create config from defaults: sudo cp /etc/pwnagotchi/default.toml /etc/pwnagotchi/config.toml","Edit it: sudo nano /etc/pwnagotchi/config.toml","Or use shortcut: config","Make your changes","CTRL+S to save, CTRL+X to exit","Restart: pwnkill"],"commands":["sudo cp /etc/pwnagotchi/default.toml /etc/pwnagotchi/config.toml","sudo nano /etc/pwnagotchi/config.toml","config","pwnkill"],"warnings":["DON'T use the wizard command - it's buggy if you enter wrong info","Use the copy method above instead"],"links":[{"text":"Complete Config Options Guide by WPA2","url":"https://github.com/wpa-2/Pwnagotchi-Plugins/blob/main/Config.toml_Options.md"}]},"config-whitelist":{"title":"Whitelist Networks","steps":["Open config: config","Find the whitelist section","Add network SSIDs or MAC addresses","Pwnagotchi will IGNORE these networks","Use this for your home/work networks"],"config":"[main]\nwhitelist = [\n    \"HOME_WIFI\",\n    \"WORK_NETWORK\",\n    \"aa:bb:cc:dd:ee:ff\"\n]","info":["You can use network names (SSIDs) or MAC addresses","MAC addresses can be partial: 'aa:bb:cc' matches 'aa:bb:cc:*'","Whitelisted ne         window.addEventListener('popstate', (event) => { if (event.state) { const state = event.state; if (state.step === 'category') { restartWizard(); } else if (state.step === 'question') { currentCategory = troubleshootData.categories.find(c => c.id === state.categoryId); history = state.history || []; document.getElementById('category-selection').style.display = 'none'; document.getElementById('wizard').classList.add('active'); document.getElementById('solution-container').innerHTML = ''; document.getElementById('help-footer').style.display = 'none'; showQuestionWithoutPush(state.questionIndex); } else if (state.step === 'solution') { goBack(); } } else { restartWizard(); } });
        function showQuestionWithoutPush(index) { const container = document.getElementById('questions-container'); container.innerHTML = ''; if (index >= currentCategory.tree.length) { showSolution('general'); return; } const question = currentCategory.tree[index]; const questionDiv = document.createElement('div'); questionDiv.className = 'question active'; let optionsHtml = ''; question.options.forEach((option, optIdx) => { optionsHtml += `<button class="option-btn" onclick="selectOption(${index}, ${optIdx})">${option.label}</button>`; }); questionDiv.innerHTML = `<div class="question-title">${question.question}</div>${question.subtitle ? `<div class="question-subtitle">${question.subtitle}</div>` : ''}<div class="options">${optionsHtml}</div>`; container.appendChild(questionDiv); updateProgress(); }
        function renderCategories() { const container = document.getElementById('category-selection'); container.innerHTML = ''; troubleshootData.categories.forEach(cat => { const card = document.createElement('div'); card.className = 'category-card'; card.onclick = () => { winkFace(); startCategory(cat.id); }; card.innerHTML = `<div class="category-icon">${cat.icon}</div><div class="category-title">${cat.title}</div><div class="category-desc">${cat.description}</div>`; container.appendChild(card); }); }
        function winkFace() { const face = document.getElementById('pwn-face'); face.textContent = '(◕‿‿-)'; setTimeout(() => { face.textContent = '(◕‿‿◕)'; }, 300); }
        function startCategory(categoryId) { currentCategory = troubleshootData.categories.find(c => c.id === categoryId); currentPath = []; history = []; document.getElementById('category-selection').style.display = 'none'; document.getElementById('wizard').classList.add('active'); document.getElementById('help-footer').style.display = 'none'; window.history.pushState({ step: 'category', categoryId }, '', ''); showQuestion(0); }
        function showQuestion(index) { const container = document.getElementById('questions-container'); container.innerHTML = ''; if (index >= currentCategory.tree.length) { showSolution('general'); return; } const question = currentCategory.tree[index]; const questionDiv = document.createElement('div'); questionDiv.className = 'question active'; let optionsHtml = ''; question.options.forEach((option, optIdx) => { optionsHtml += `<button class="option-btn" onclick="selectOption(${index}, ${optIdx})">${option.label}</button>`; }); questionDiv.innerHTML = `<div class="question-title">${question.question}</div>${question.subtitle ? `<div class="question-subtitle">${question.subtitle}</div>` : ''}<div class="options">${optionsHtml}</div>`; container.appendChild(questionDiv); updateProgress(); window.history.pushState({ step: 'question', categoryId: currentCategory.id, questionIndex: index, history: JSON.parse(JSON.stringify(history)) }, '', ''); }
        function selectOption(questionIndex, optionIndex) { const question = currentCategory.tree[questionIndex]; const option = question.options[optionIndex]; history.push({ questionIndex, optionIndex }); currentPath.push(option.label); if (option.solution) { showSolution(option.solution, option.solutionData); } else if (option.next !== undefined) { showQuestion(option.next); } else { showSolution('general'); } }
        function showSolution(solutionId, extraData = {}) { const solution = currentCategory.solutions[solutionId]; if (!solution) { console.error('Solution not found:', solutionId); return; } document.getElementById('wizard').classList.remove('active'); document.getElementById('help-footer').style.display = 'block'; window.history.pushState({ step: 'solution', categoryId: currentCategory.id, solutionId, history: JSON.parse(JSON.stringify(history)) }, '', ''); const container = document.getElementById('solution-container'); container.innerHTML = ''; const solutionDiv = document.createElement('div'); solutionDiv.className = 'solution active'; let html = `<div class="solution-title">${solution.title}</div>`; if (solution.warnings && solution.warnings.length > 0) { html += '<div class="solution-section"><h3>⚠️ Important</h3>'; solution.warnings.forEach(warning => { if (warning.includes('CRITICAL') || warning.includes('NEVER')) { html += `<div class="critical-warning">🚨 ${warning}</div>`; } else { html += `<div class="warning-box">⚠️ ${warning}</div>`; } }); html += '</div>'; } if (solution.steps && solution.steps.length > 0) { html += '<div class="solution-section"><h3>📋 Steps</h3>'; solution.steps.forEach((step, idx) => { html += `<div class="solution-step">${idx + 1}. ${step}</div>`; }); html += '</div>'; } if (solution.commands && solution.commands.length > 0) { html += '<div class="solution-section"><h3>⚡ Commands</h3>'; solution.commands.forEach(cmd => { html += `<div class="cmd-box" onclick="copyCommand(this)">${escapeHtml(cmd)}</div>`; }); html += '</div>'; } if (solution.config) { html += `<div class="solution-section"><h3>⚙️ Configuration</h3><div class="config-example">${escapeHtml(solution.config)}</div></div>`; } if (solution.info && solution.info.length > 0) { html += '<div class="solution-section"><h3>💡 Additional Info</h3>'; solution.info.forEach(info => { html += `<div class="info-box">ℹ️ ${info}</div>`; }); html += '</div>'; } if (solution.links && solution.links.length > 0) { html += '<div class="solution-section"><h3>🔗 Helpful Links</h3>'; solution.links.forEach(link => { html += `<div class="link-box">📖 <a href="${link.url}" target="_blank">${link.text}</a></div>`; }); html += '</div>'; } if (solution.displaySelector) { html += renderDisplaySelector(); } html += `<div class="nav-buttons"><button class="nav-btn" onclick="goBack()">← BACK</button><button class="nav-btn" onclick="restartWizard()">⟲ START OVER</button></div>`; solutionDiv.innerHTML = html; container.appendChild(solutionDiv); }
