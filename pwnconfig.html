        async delete(key) { localStorage.removeItem("pwnconfig_" + key); return { key, deleted: true }; },
        async list(prefix) { const keys = []; for (let i = 0; i < localStorage.length; i++) { const k = localStorage.key(i); if (k.startsWith("pwnconfig_" + (prefix || ""))) keys.push(k.replace("pwnconfig_", "")); } return { keys }; }

// ── TOML parser (fixed: handles quoted strings with inline comments) ─
function parseToml(text) {
  const result = {};
  let currentSection = null;
  const lines = text.split("\n");
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line || line.startsWith("#")) continue;
    // Match section headers — strip any trailing inline comment (e.g. [section] # comment)
    const secMatch = line.match(/^\[([^\]]+)\]/);
    if (secMatch) {
      currentSection = secMatch[1];
      const parts = currentSection.split(".");
      let obj = result;
      for (const p of parts) {
        if (!obj[p]) obj[p] = {};
        obj = obj[p];
      }
      continue;
    }
    if (currentSection) {
      const kvMatch = line.match(/^([a-zA-Z0-9_\-]+)\s*=\s*(.+)$/);
      if (kvMatch) {
        const key = kvMatch[1];
        let val = kvMatch[2].trim();

        // ── FIX: parse values correctly so inline comments on quoted
        //    strings (e.g. gateway = "" # comment) don't corrupt output
        if (val === "true") {
          val = true;
        } else if (val === "false") {
          val = false;
        } else if (val.startsWith('"')) {
          // Find the matching closing quote starting after the opening one
          const close = val.indexOf('"', 1);
          // Extract content between the quotes; anything after is a comment
          val = close !== -1 ? val.slice(1, close) : val.slice(1);
        } else if (val.startsWith("[")) {
          // Simple array — strip trailing comment first, then parse
          const noComment = val.includes("#") ? val.split("#")[0].trim() : val;
          if (noComment.endsWith("]")) {
            try { val = JSON.parse(noComment.replace(/'/g, '"')); } catch (e) { val = []; }
          } else {
            val = [];
          }
        } else {
          // Unquoted scalar — strip trailing comment then coerce to number
          if (val.includes("#")) val = val.split("#")[0].trim();
          if (!isNaN(Number(val)) && val !== "") val = Number(val);
        }

        // Set in result object
        const parts = currentSection.split(".");
        let obj = result;
        for (const p of parts) obj = obj[p];
        obj[key] = val;
      }
    }
  }
  return result;
}

function extractPlugins(parsed) {
  const plugins = {};
  if (parsed.main && parsed.main.plugins) {
    Object.keys(parsed.main.plugins).forEach((name) => {
      plugins[name] = { ...parsed.main.plugins[name] };
    });
  }
  return plugins;
}

// ── Validation ───────────────────────────────────────────────────────
const SECRET_KEYS = ["api_key", "key", "token", "password"];

// Keys that MUST be non-empty when the plugin is enabled
const REQUIRED_PLUGIN_KEYS = {
  "wpa-sec":  ["api_key"],
  "wigle":    ["api_key"],
  "ohcapi":   ["api_key"],
  "pwncrack": ["key"],
  "gdrivesync": [], // no secret key required
};

function validateConfig(cfg) {
  const errors = [];   // must fix / shown as blockers (user must acknowledge)
  const warnings = []; // nice-to-fix

  // ── Warnings ──────────────────────────────────────────────────────
  if (!cfg.name || cfg.name.trim() === "") {
    warnings.push({ id: "no-name", msg: "No device name set — defaults to \"pwnagotchi\"." });
  }

  if (cfg.whitelist.length === 0) {
    warnings.push({ id: "no-whitelist", msg: "Whitelist is empty. Your pwnagotchi will target every visible network, including your own." });
  }

  if (cfg.display.enabled && !cfg.display.type) {
    warnings.push({ id: "no-display-type", msg: "Display is enabled but no display type is selected." });
  }

  // Pwndroid/GPS listener enabled but gps_listener also on — not really an error but worth noting
  const pwndroid = cfg.plugins["pwndroid"];
  const gpsListener = cfg.plugins["gps_listener"];
  if (pwndroid && pwndroid.enabled && gpsListener && gpsListener.enabled) {
    warnings.push({ id: "pwndroid-gpslistener", msg: "Both pwndroid and gps_listener are enabled. gps_listener is for pwndroid GPS — this is fine, just making sure it's intentional." });
  }

  // ── Errors ────────────────────────────────────────────────────────
  // Web auth with default credentials
  if (cfg.web.auth) {
    if (cfg.web.username === "changeme" || cfg.web.password === "changeme") {
      errors.push({ id: "default-web-creds", msg: "Web UI authentication is on but you're still using default credentials (changeme). Change these before deploying." });
    }
  }

  // Enabled plugins with empty required keys
  Object.keys(REQUIRED_PLUGIN_KEYS).forEach((pluginName) => {
    const plug = cfg.plugins[pluginName];
    if (!plug || !plug.enabled) return;
    const requiredKeys = REQUIRED_PLUGIN_KEYS[pluginName];
    requiredKeys.forEach((k) => {
      if (!plug[k] || String(plug[k]).trim() === "") {
        errors.push({ id: pluginName + "-" + k, msg: pluginName + " is enabled but \"" + k + "\" is empty. The plugin won't work without it." });
      }
    });
  });

  // auto_backup with default/empty path
  const backup = cfg.plugins["auto_backup"];
  if (backup && backup.enabled) {
    const loc = backup.backup_location || "";
    if (!loc || loc.trim() === "") {
      errors.push({ id: "backup-no-path", msg: "auto_backup is enabled but backup_location is empty. Set a path like /etc/pwnagotchi/backups." });
    }
  }

  return { errors, warnings };
}

// ── TOML generator ───────────────────────────────────────────────────
function buildToml(cfg) {
  const user = (cfg.piUser || "pi").trim() || "pi";
  const homePath = "/home/" + user;
  // Substitute /home/pi/ in any string value with the chosen username
  function subPath(s) { return s.replace(/\/home\/pi\b/g, homePath); }

  const L = [];
  L.push("[main]");
  L.push('name = "' + (cfg.name || "pwnagotchi") + '"');
  L.push('lang = "' + cfg.lang + '"');
  L.push('iface = "wlan0mon"');
  L.push('mon_start_cmd = "/usr/bin/monstart"');
  L.push('mon_stop_cmd = "/usr/bin/monstop"');
  L.push("mon_max_blind_epochs = 5");
  L.push("no_restart = false");
  if (cfg.whitelist.length > 0) {
    L.push("whitelist = [");
    cfg.whitelist.forEach((w) => L.push('    "' + w + '",'));
    L.push("]");
  } else { L.push("whitelist = []"); }
  L.push('confd = "/etc/pwnagotchi/conf.d/"');
  L.push('custom_plugins = "/usr/local/share/pwnagotchi/custom-plugins/"');
  L.push("custom_plugin_repos = [");
  L.push('    "https://github.com/jayofelony/pwnagotchi-torch-plugins/archive/master.zip",');
  L.push('    "https://github.com/Sniffleupagus/pwnagotchi_plugins/archive/master.zip",');
  L.push('    "https://github.com/NeonLightning/pwny/archive/master.zip",');
  L.push('    "https://github.com/marbasec/UPSLite_Plugin_1_3/archive/master.zip",');
  L.push('    "https://github.com/wpa-2/Pwnagotchi-Plugins/archive/master.zip",');
  L.push('    "https://github.com/cyberartemio/wardriver-pwnagotchi-plugin/archive/main.zip"');
  L.push("]");
  L.push("");

  Object.keys(cfg.plugins).forEach((name) => {
    const opts = cfg.plugins[name];
    L.push("[main.plugins." + name + "]");
    Object.keys(opts).forEach((k) => {
      const v = opts[k];
      if (Array.isArray(v)) {
        if (v.length === 0) {
          L.push(k + " = []");
        } else {
          // Render inline: [7, 85] or ["val"] — matches defaults.toml style
          const items = v.map((item) => typeof item === "string" ? '"' + item + '"' : String(item));
          L.push(k + " = [" + items.join(", ") + "]");
        }
      } else if (typeof v === "string") L.push(k + ' = "' + subPath(v) + '"');
      else if (typeof v === "boolean") L.push(k + " = " + v);
      else if (typeof v === "number") L.push(k + " = " + v);
    });
    L.push("");
  });

  L.push("[main.log]");
  L.push('path = "/etc/pwnagotchi/log/pwnagotchi.log"');
  L.push('path-debug = "/etc/pwnagotchi/log/pwnagotchi-debug.log"');
  L.push(""); L.push("[main.log.rotation]"); L.push("enabled = true"); L.push('size = "10M"'); L.push("");

  const p = cfg.personality;
  L.push("[personality]");
  L.push("advertise = " + p.advertise); L.push("deauth = " + p.deauth); L.push("associate = " + p.associate);
  L.push("channels = " + (p.channels.length > 0 ? "[" + p.channels.join(", ") + "]" : "[]"));
  L.push("min_rssi = " + p.min_rssi); L.push("ap_ttl = " + p.ap_ttl); L.push("sta_ttl = " + p.sta_ttl);
  L.push("recon_time = " + p.recon_time); L.push("max_inactive_scale = 2"); L.push("recon_inactive_multiplier = 2");
  L.push("hop_recon_time = " + p.hop_recon_time); L.push("min_recon_time = " + p.min_recon_time);
  L.push("max_interactions = " + p.max_interactions); L.push("max_misses_for_recon = " + p.max_misses_for_recon);
  L.push("excited_num_epochs = " + p.excited_num_epochs); L.push("bored_num_epochs = " + p.bored_num_epochs);
  L.push("sad_num_epochs = " + p.sad_num_epochs); L.push("bond_encounters_factor = " + p.bond_encounters_factor);
  L.push("throttle_a = " + p.throttle_a); L.push("throttle_d = " + p.throttle_d); L.push("");

  L.push("[ui]"); L.push("invert = " + cfg.invert); L.push("cursor = true"); L.push("fps = 0.0"); L.push("");
  L.push("[ui.font]"); L.push('name = "DejaVuSansMono"'); L.push("size_offset = 0"); L.push("");
  L.push("[ui.web]"); L.push("enabled = true"); L.push('address = "::"');
  L.push("auth = " + cfg.web.auth);
  L.push('username = "' + cfg.web.username + '"'); L.push('password = "' + cfg.web.password + '"');
  L.push('origin = ""'); L.push("port = 8080"); L.push('on_frame = ""'); L.push("");
  L.push("[ui.display]"); L.push("enabled = " + cfg.display.enabled);
  L.push("rotation = " + cfg.display.rotation); L.push('type = "' + cfg.display.type + '"'); L.push("");

  var hsPath = cfg.imageVersion === "old" ? homePath + "/handshakes" : "/etc/pwnagotchi/handshakes";
  L.push("[bettercap]"); L.push('handshakes = "' + hsPath + '"'); L.push("silence = [");
  const silenceEntries = ["ble.device.new","ble.device.lost","ble.device.service.discovered","ble.device.characteristic.discovered",
   "ble.device.disconnected","ble.device.connected","ble.connection.timeout","wifi.client.new",
   "wifi.client.lost","wifi.client.probe","wifi.ap.new","wifi.ap.lost","mod.started"];
  silenceEntries.forEach((s, i) => L.push('    "' + s + '"' + (i < silenceEntries.length - 1 ? "," : "")));
  L.push("]"); L.push("");

  L.push("[fs.memory]"); L.push("enabled = true"); L.push("");
  L.push("[fs.memory.mounts.log]"); L.push("enabled = true"); L.push('mount = "/etc/pwnagotchi/log/"');
  L.push('size = "50M"'); L.push("sync = 60"); L.push("zram = true"); L.push("rsync = true"); L.push("");
  L.push("[fs.memory.mounts.data]"); L.push("enabled = true"); L.push('mount = "/var/tmp/pwnagotchi"');
  L.push('size = "10M"'); L.push("sync = 3600"); L.push("zram = true"); L.push("rsync = true");

  return L.join("\n") + "\n";
}

function Toggle({ checked, onChange, label, desc }) {
  return (
    <div className="flex items-start gap-3 py-2 cursor-pointer select-none" onClick={() => onChange(!checked)}>
      <div className="flex-shrink-0 mt-0.5">
        <div className={"w-11 h-6 rounded-full transition-all duration-200 relative " + (checked ? "bg-emerald-500" : "bg-zinc-700")}>
          <div className={"absolute top-0.5 w-5 h-5 rounded-full bg-white shadow-md transition-all duration-200 " + (checked ? "left-5" : "left-0.5")} />
        </div>
      </div>
      <div className="flex-1 min-w-0">
        <span className="text-zinc-200 text-sm font-medium">{label}</span>
        {desc && <p className="text-zinc-500 text-xs mt-0.5">{desc}</p>}
      </div>
    </div>
  );
}

function TextInput({ label, value, onChange, placeholder, type, desc, mono }) {
  return (
    <div className="space-y-1">
      <label className="text-zinc-400 text-xs uppercase tracking-wider font-semibold">{label}</label>
      <input type={type || "text"} value={value} onChange={(e) => onChange(e.target.value)} placeholder={placeholder}
        className={"w-full bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 text-sm text-zinc-200 placeholder-zinc-600 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500/30 transition-all" + (mono ? " font-mono" : "")} />
      {desc && <p className="text-zinc-600 text-xs">{desc}</p>}
    </div>
  );
}

function NumInput({ label, value, onChange, min, max, step, desc }) {
  return (
    <div className="space-y-1">
      {label && <label className="text-zinc-400 text-xs uppercase tracking-wider font-semibold">{label}</label>}
      <input type="number" value={value} onChange={(e) => onChange(Number(e.target.value))} min={min} max={max} step={step || 1}
        className="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 text-sm text-zinc-200 font-mono focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500/30 transition-all" />
      {desc && <p className="text-zinc-600 text-xs">{desc}</p>}
    </div>
  );
}

function SelectBox({ label, value, onChange, options, desc }) {
  return (
    <div className="space-y-1">
      <label className="text-zinc-400 text-xs uppercase tracking-wider font-semibold">{label}</label>
      <select value={value} onChange={(e) => onChange(e.target.value)}
        className="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 text-sm text-zinc-200 focus:outline-none focus:border-emerald-500 transition-all">
        {options.map((o) => <option key={typeof o === "string" ? o : o.id} value={typeof o === "string" ? o : o.id}>{typeof o === "string" ? o : o.label}</option>)}
      </select>
      {desc && <p className="text-zinc-600 text-xs">{desc}</p>}
    </div>
  );
}

function Section({ title }) {
  return <p className="text-zinc-500 text-xs uppercase tracking-wider font-bold px-1 pt-3 pb-1 border-t border-zinc-800/50 mt-2">{title}</p>;
}

function Tip({ label, tip, children }) {
  const [show, setShow] = useState(false);
  return (
    <div className="relative"
      onMouseEnter={() => setShow(true)} onMouseLeave={() => setShow(false)}
      onTouchStart={() => setShow(!show)}>
      <div className="flex items-center gap-1">
        <label className="text-zinc-400 text-xs uppercase tracking-wider font-semibold">{label}</label>
        <span className="text-zinc-600 text-xs cursor-help select-none">(?)</span>
      </div>
      {show && (
        <div className="absolute z-50 bottom-full left-0 mb-2 w-64 bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2 shadow-xl">
          <p className="text-zinc-300 text-xs leading-relaxed">{tip}</p>
          <div className="absolute top-full left-4 w-0 h-0 border-l-4 border-r-4 border-t-4 border-transparent border-t-zinc-700" />
        </div>
      )}
      {children}
    </div>
  );
}

// ── Validator panel ───────────────────────────────────────────────────
function ValidatorPanel({ cfg, onDismissErrors, errorsAcknowledged }) {
  const { errors, warnings } = useMemo(() => validateConfig(cfg), [cfg]);
  const allClear = errors.length === 0 && warnings.length === 0;
  const hasBlockers = errors.length > 0 && !errorsAcknowledged;

  if (allClear) {
    return (
      <div className="flex items-center gap-2 bg-emerald-500/10 border border-emerald-500/30 rounded-xl px-4 py-3">
        <span className="text-emerald-400 text-base">✓</span>
        <div>
          <p className="text-emerald-400 text-sm font-semibold">Config looks good</p>
          <p className="text-emerald-500/60 text-xs">No issues found. Ready to download.</p>
        </div>
      </div>
    );
  }

  return (
    <div className="space-y-2">
      {/* Errors */}
      {errors.length > 0 && (
        <div className={"rounded-xl border overflow-hidden " + (errorsAcknowledged ? "border-zinc-700" : "border-red-500/40")}>
          <div className={"flex items-center justify-between px-3 py-2 " + (errorsAcknowledged ? "bg-zinc-800/60" : "bg-red-500/10")}>
            <div className="flex items-center gap-2">
              <span className={"text-sm " + (errorsAcknowledged ? "text-zinc-500" : "text-red-400")}>
                {errorsAcknowledged ? "⚠" : "✕"}
              </span>
              <span className={"text-xs font-bold uppercase tracking-wider " + (errorsAcknowledged ? "text-zinc-500" : "text-red-400")}>
                {errors.length} issue{errors.length > 1 ? "s" : ""} found
                {errorsAcknowledged && " (acknowledged)"}
              </span>
            </div>
            {!errorsAcknowledged && (
              <button
                onClick={onDismissErrors}
                className="text-xs text-red-400/70 hover:text-red-300 border border-red-500/30 hover:border-red-400/50 rounded px-2 py-0.5 transition-all">
                Acknowledge &amp; proceed anyway
              </button>
            )}
          </div>
          <div className="divide-y divide-zinc-800/60">
            {errors.map((e) => (
              <div key={e.id} className="flex items-start gap-2 px-3 py-2">
                <span className={"text-xs mt-0.5 shrink-0 " + (errorsAcknowledged ? "text-zinc-600" : "text-red-500")}>•</span>
                <p className={"text-xs leading-relaxed " + (errorsAcknowledged ? "text-zinc-600" : "text-red-300")}>{e.msg}</p>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Warnings */}
      {warnings.length > 0 && (
        <div className="rounded-xl border border-amber-500/30 overflow-hidden">
          <div className="flex items-center gap-2 px-3 py-2 bg-amber-500/8">
            <span className="text-amber-400 text-sm">!</span>
            <span className="text-amber-400 text-xs font-bold uppercase tracking-wider">
              {warnings.length} warning{warnings.length > 1 ? "s" : ""}
            </span>
          </div>
          <div className="divide-y divide-zinc-800/60">
            {warnings.map((w) => (
              <div key={w.id} className="flex items-start gap-2 px-3 py-2">
                <span className="text-amber-500 text-xs mt-0.5 shrink-0">•</span>
                <p className="text-amber-200/60 text-xs leading-relaxed">{w.msg}</p>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────
function PwnConfig() {
  const [step, setStep] = useState(0);
  const [displaySearch, setDisplaySearch] = useState("");
  const [expandedGroup, setExpandedGroup] = useState(null);
  const [whitelistInput, setWhitelistInput] = useState("");
  const [copied, setCopied] = useState(false);
  const [confirmRestart, setConfirmRestart] = useState(false);
  const [writeStatus, setWriteStatus] = useState(null);
  const [showPwnstore, setShowPwnstore] = useState(false);
  const [syncStatus, setSyncStatus] = useState("loading");
  const [lastSynced, setLastSynced] = useState(null);
  const [remotePlugins, setRemotePlugins] = useState(null);
  const [errorsAcknowledged, setErrorsAcknowledged] = useState(false);

  const [cfg, setCfg] = useState({
    name: "", lang: "en", piUser: "pi", imageVersion: "new",
    display: { enabled: false, type: "waveshare_4", rotation: 180 },
    invert: false, whitelist: [],
    personality: {
      advertise: true, deauth: true, associate: true, channels: [],
      min_rssi: -200, ap_ttl: 120, sta_ttl: 300, recon_time: 30,
      hop_recon_time: 10, min_recon_time: 5, max_interactions: 3,
      max_misses_for_recon: 5, excited_num_epochs: 10, bored_num_epochs: 15,
      sad_num_epochs: 25, bond_encounters_factor: 20000, throttle_a: 0.4, throttle_d: 0.9
    },
    plugins: {},
    web: { auth: false, username: "changeme", password: "changeme" }
  });

  // Reset acknowledgement whenever cfg changes so new errors re-surface
  useEffect(() => { setErrorsAcknowledged(false); }, [cfg]);

  // ── Fetch + cache defaults.toml ────────────────────────────────────
  useEffect(() => {
    async function loadDefaults() {
      try {
        const cached = await window.storage.get(CACHE_KEY);
        if (cached) {
          const data = JSON.parse(cached.value);
          if (Date.now() - data.ts < CACHE_MAX_AGE) {
            applyRemotePlugins(data.plugins);
            setLastSynced(new Date(data.ts));
            setSyncStatus("cached");
            return;
          }
        }
      } catch (e) {}
      await fetchFromGitHub();
    }
    loadDefaults();
  }, []);

  async function fetchFromGitHub() {
    setSyncStatus("fetching");
    try {
      const resp = await fetch(GITHUB_RAW_URL);
      if (!resp.ok) throw new Error("HTTP " + resp.status);
      const text = await resp.text();
      const parsed = parseToml(text);
      const plugins = extractPlugins(parsed);
      const now = Date.now();
      try { await window.storage.set(CACHE_KEY, JSON.stringify({ plugins, ts: now })); } catch (e) {}
      applyRemotePlugins(plugins);
      setLastSynced(new Date(now));
      setSyncStatus("synced");
    } catch (e) {
      console.warn("Could not fetch defaults.toml, using built-in:", e);
      applyFallbackPlugins();
      setSyncStatus("offline");
    }
  }

  function applyRemotePlugins(plugins) {
    setRemotePlugins(plugins);
    setCfg((prev) => {
      if (Object.keys(prev.plugins).length > 0) return prev;
      const next = { ...prev, plugins: {} };
      Object.keys(plugins).forEach((name) => {
        next.plugins[name] = { ...plugins[name] };
        Object.keys(next.plugins[name]).forEach((k) => {
          if (SECRET_KEYS.includes(k) && typeof next.plugins[name][k] === "string") {
            next.plugins[name][k] = "";
          }
        });
      });
      return next;
    });
  }

  function applyFallbackPlugins() {
    const fallback = {
      "auto-tune": { enabled: true },
      "auto_backup": { enabled: true, backup_location: "/etc/pwnagotchi/backups" },
      "auto-update": { enabled: true, install: true, interval: 1, token: "" },
      "bt-tether": { enabled: false, show_on_screen: true, show_mini_status: true, mini_status_position: [110, 0], show_detailed_status: true, detailed_status_position: [0, 82], auto_reconnect: true, reconnect_interval: 60, reconnect_failure_cooldown: 300, discord_webhook_url: "" },
      "fix_services": { enabled: true },
      "cache": { enabled: true },
      "gdrivesync": { enabled: false, backupfiles: [""], backup_folder: "PwnagotchiBackups", interval: 1 },
      "gpio_buttons": { enabled: false },
      "gps": { enabled: false, speed: 19200, device: "/dev/ttyUSB0" },
      "gps_listener": { enabled: false },
      "grid": { enabled: true, report: true },
      "logtail": { enabled: false, "max-lines": 10000 },
      "memtemp": { enabled: false, scale: "celsius", orientation: "horizontal" },
      "ohcapi": { enabled: false, api_key: "", receive_email: "yes" },
      "pwndroid": { enabled: false, gateway: "", display: false, display_altitude: false },
      "pisugarx": { enabled: false, rotation: false, default_display: "percentage", lowpower_shutdown: true, lowpower_shutdown_level: 10, max_charge_voltage_protection: false },
      "pwncrack": { enabled: false, key: "" },
      "session-stats": { enabled: false, save_directory: "/etc/pwnagotchi/sessions/" },
      "ups_hat_c": { enabled: false, label_on: true, shutdown: 5, bat_x_coord: 140, bat_y_coord: 0 },
      "ups_lite": { enabled: false, shutdown: 2 },
      "webcfg": { enabled: true },
      "pwnstore_ui": { enabled: true },
      "webgpsmap": { enabled: false },
      "wigle": { enabled: false, api_key: "", cvs_dir: "/tmp", donate: false, timeout: 30, position: [7, 85] },
      "wpa-sec": { enabled: false, api_key: "", api_url: "https://wpa-sec.stanev.org", download_results: false, show_pwd: false, single_files: false },
      "switcher": { enabled: false },
      "wittypi": { enabled: false },
    };
    applyRemotePlugins(fallback);
  }

  // ── State helpers ─────────────────────────────────────────────────
  const update = useCallback((path, val) => {
    setCfg((prev) => {
      const next = JSON.parse(JSON.stringify(prev));
      const parts = path.split("."); let obj = next;
      for (let i = 0; i < parts.length - 1; i++) obj = obj[parts[i]];
      obj[parts[parts.length - 1]] = val; return next;
    });
  }, []);

  const updatePlug = useCallback((name, key, val) => {
    setCfg((prev) => {
      const next = JSON.parse(JSON.stringify(prev));
      next.plugins[name][key] = val; return next;
    });
  }, []);

  const addWL = () => {
    const val = whitelistInput.trim();
    if (val && cfg.whitelist.indexOf(val) === -1) { update("whitelist", cfg.whitelist.concat([val])); setWhitelistInput(""); }
  };

  const toggleCh = (ch) => {
    const cur = cfg.personality.channels;
    update("personality.channels", cur.indexOf(ch) >= 0 ? cur.filter((c) => c !== ch) : cur.concat([ch]).sort((a, b) => a - b));
  };

  const doRestart = () => {
    if (!confirmRestart) { setConfirmRestart(true); setTimeout(() => setConfirmRestart(false), 3000); return; }
    setConfirmRestart(false);
    setCfg((prev) => ({
      name: "", lang: "en", piUser: prev.piUser || "pi", imageVersion: prev.imageVersion || "new", display: { enabled: false, type: "waveshare_4", rotation: 180 },
      invert: false, whitelist: [],
      personality: { advertise: true, deauth: true, associate: true, channels: [], min_rssi: -200, ap_ttl: 120, sta_ttl: 300, recon_time: 30, hop_recon_time: 10, min_recon_time: 5, max_interactions: 3, max_misses_for_recon: 5, excited_num_epochs: 10, bored_num_epochs: 15, sad_num_epochs: 25, bond_encounters_factor: 20000, throttle_a: 0.4, throttle_d: 0.9 },
      plugins: remotePlugins ? Object.keys(remotePlugins).reduce((acc, name) => {
        acc[name] = { ...remotePlugins[name] };
        Object.keys(acc[name]).forEach((k) => { if (SECRET_KEYS.includes(k) && typeof acc[name][k] === "string") acc[name][k] = ""; });
        return acc;
      }, {}) : prev.plugins,
      web: { auth: false, username: "changeme", password: "changeme" }
    }));
    setStep(0); setDisplaySearch(""); setExpandedGroup(null); setWhitelistInput("");
  };

  const filteredDisplays = useMemo(() => {
    if (!displaySearch) return DISPLAYS;
    const s = displaySearch.toLowerCase();
    const result = {};
    Object.keys(DISPLAYS).forEach((group) => {
      const f = DISPLAYS[group].filter((d) => d.id.toLowerCase().includes(s) || d.label.toLowerCase().includes(s) || group.toLowerCase().includes(s));
      if (f.length > 0) result[group] = f;
    });
    return result;
  }, [displaySearch]);

  const toml = useMemo(() => buildToml(cfg), [cfg]);

  // Validate for gating download/copy
  const validation = useMemo(() => validateConfig(cfg), [cfg]);
  const canProceed = validation.errors.length === 0 || errorsAcknowledged;

  const doDownload = () => {
    if (!canProceed) return;
    const blob = new Blob([toml], { type: "text/plain" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = "config.toml";
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    setShowPwnstore(true);
  };

  const doCopy = () => {
    if (!canProceed) return;
    const ta = document.createElement("textarea"); ta.value = toml; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
    setCopied(true); setTimeout(() => setCopied(false), 2000);
  };

  const doWriteToBoot = async () => {
    if (!canProceed) return;
    if (!window.showDirectoryPicker) { setWriteStatus("unsupported"); setTimeout(() => setWriteStatus(null), 4000); return; }
    try {
      setWriteStatus("writing");
      const dirHandle = await window.showDirectoryPicker({ mode: "readwrite", startIn: "desktop" });
      const fileHandle = await dirHandle.getFileHandle("config.toml", { create: true });
      const writable = await fileHandle.createWritable();
      await writable.write(toml);
      await writable.close();
      setWriteStatus("done");
      setTimeout(() => setWriteStatus(null), 5000);
      setShowPwnstore(true);
    } catch (e) {
      if (e.name === "AbortError") { setWriteStatus(null); } else { setWriteStatus("error"); setTimeout(() => setWriteStatus(null), 4000); }
    }
  };

  // ── Plugin renderer ───────────────────────────────────────────────
  function renderPluginToggle(name) {
    if (!cfg.plugins[name]) return null;
    const meta = PLUGIN_META[name] || { desc: "" };
    if (meta.group === "hidden") return null;
    const opts = cfg.plugins[name];
    const extraKeys = Object.keys(opts).filter((k) => k !== "enabled");
    const isOn = opts.enabled;
    return (
      <div key={name}>
        <Toggle checked={isOn} onChange={(v) => updatePlug(name, "enabled", v)} label={name} desc={meta.desc || name} />
        {isOn && extraKeys.length > 0 && (
          <div className="pl-8 pb-2 space-y-2">
            {extraKeys.map((k) => {
              const v = opts[k];
              const isSecret = SECRET_KEYS.includes(k);
              if (Array.isArray(v)) return <p key={k} className="text-zinc-600 text-xs font-mono">{k} = [{v.join(", ")}] <span className="text-zinc-700">(edit in generated config)</span></p>;
              if (typeof v === "boolean") return <Toggle key={k} checked={v} onChange={(val) => updatePlug(name, k, val)} label={k.replace(/_/g, " ")} />;
              if (typeof v === "number") return <NumInput key={k} label={k} value={v} onChange={(val) => updatePlug(name, k, val)} min={0} max={99999} />;
              if (typeof v === "string") return <TextInput key={k} label={k} value={v} onChange={(val) => updatePlug(name, k, val)} placeholder={isSecret ? "Enter your key..." : v} mono={isSecret} type={isSecret ? "password" : "text"} />;
              return null;
            })}
          </div>
        )}
      </div>
    );
  }

  function getPluginsByGroup(group) {
    return Object.keys(cfg.plugins).filter((name) => {
      const meta = PLUGIN_META[name];
      if (!meta) return group === "Other";
      return meta.group === group;
    });
  }

  // ── Step content ──────────────────────────────────────────────────
  const renderContent = () => {
    // IDENTITY
    if (step === 0) return (
      <div className="space-y-6">
        <div><h2 className="text-xl font-bold text-zinc-100 mb-1">Name Your Pwnagotchi</h2><p className="text-zinc-500 text-sm">Unique identity. No spaces. Leave blank for default.</p></div>
        <TextInput label="Device Name" value={cfg.name} onChange={(v) => update("name", v.replace(/\s/g, ""))} placeholder="pwnagotchi" mono desc="Hostname and mesh display name" />
        <SelectBox label="Language" value={cfg.lang} onChange={(v) => update("lang", v)} options={LANGS} desc="Personality voice phrases" />
        <div>
          <TextInput label="Custom Username" value={cfg.piUser} onChange={(v) => update("piUser", v.replace(/\s/g, ""))} placeholder="pi" mono
            desc={cfg.imageVersion === "new" ? 'v2.9.5.5+ runs as root — this only affects generated paths for older images.' : 'System username set during flashing. Leave as "pi" unless you changed it.'} />
          <div className="mt-1.5 bg-zinc-900/50 border border-zinc-800 rounded-lg px-3 py-2">
            <span className="text-zinc-600 text-xs">Paths will use: </span>
            <span className="font-mono text-emerald-400/80 text-xs">/home/{cfg.piUser || "pi"}/</span>
          </div>
          {cfg.piUser && cfg.piUser !== "pi" && cfg.piUser.trim() !== "" && (
            <div className="mt-1.5 bg-amber-500/10 border border-amber-500/30 rounded-lg px-3 py-2">
              <p className="text-amber-400 text-xs"><strong>⚠ Requires Pwnagotchi v2.9.5.5+</strong> — custom usernames are not supported on earlier versions. If you're running an older image, leave this as <span className="font-mono">pi</span>.</p>
            </div>
          )}
        </div>
        <div className="space-y-1">
          <label className="text-zinc-400 text-xs uppercase tracking-wider font-semibold">Image Version</label>
          <div className="grid grid-cols-2 gap-2">
            <button onClick={() => update("imageVersion", "new")}
              className={"px-4 py-3 rounded-lg text-sm font-medium border transition-all " + (cfg.imageVersion === "new" ? "bg-emerald-500/15 text-emerald-400 border-emerald-500/40" : "bg-zinc-900 text-zinc-500 border-zinc-700 hover:border-zinc-500")}>
              <div className="font-bold">v2.9.5.5+</div>
              <div className="text-xs opacity-60 mt-0.5">noai / latest</div>
            </button>
            <button onClick={() => update("imageVersion", "old")}
              className={"px-4 py-3 rounded-lg text-sm font-medium border transition-all " + (cfg.imageVersion === "old" ? "bg-emerald-500/15 text-emerald-400 border-emerald-500/40" : "bg-zinc-900 text-zinc-500 border-zinc-700 hover:border-zinc-500")}>
              <div className="font-bold">Pre-2.9.5.5</div>
              <div className="text-xs opacity-60 mt-0.5">v2.9.5.4 and older</div>
            </button>
          </div>
          <p className="text-zinc-600 text-xs">v2.9.5.5 moved handshakes to /etc/pwnagotchi/handshakes and runs as root.</p>
        </div>
        <div className="bg-zinc-900/50 rounded-xl p-4 border border-zinc-800">
          <span className="text-zinc-500 text-sm mr-2">(◕‿‿◕)</span>
          <span className="font-mono text-emerald-400 text-lg">{cfg.name || "pwnagotchi"}</span>
          <span className="text-zinc-600 text-lg font-mono">&gt;</span>
        </div>
      </div>
    );
    // DISPLAY
    if (step === 1) return (
      <div className="space-y-5">
        <div><h2 className="text-xl font-bold text-zinc-100 mb-1">Display Setup</h2><p className="text-zinc-500 text-sm">Most popular: Waveshare 2.13in v4</p></div>
        <Toggle checked={cfg.display.enabled} onChange={(v) => update("display.enabled", v)} label="Enable Display" desc="Disable for headless" />
        {cfg.display.enabled && (<div className="space-y-4">
          <input type="text" value={displaySearch} onChange={(e) => setDisplaySearch(e.target.value)} placeholder="Search displays..."
            className="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 text-sm text-zinc-200 placeholder-zinc-600 focus:outline-none focus:border-emerald-500 transition-all" />
          <div className="max-h-64 overflow-y-auto rounded-xl border border-zinc-800 bg-zinc-900/30">
            {Object.keys(filteredDisplays).map((group) => {
              const items = filteredDisplays[group];
              const isOpen = expandedGroup === group || displaySearch.length > 0;
              return (<div key={group}>
                <button onClick={() => setExpandedGroup(expandedGroup === group ? null : group)}
                  className="w-full text-left px-3 py-2 text-xs font-bold uppercase tracking-wider text-zinc-500 hover:text-zinc-300 bg-zinc-900/80 sticky top-0 flex justify-between items-center">
                  <span>{group}</span><span className="text-zinc-700">{isOpen ? "v" : ">"} {items.length}</span>
                </button>
                {isOpen && items.map((d) => (
                  <button key={d.id} onClick={() => update("display.type", d.id)}
                    className={"w-full text-left px-4 py-1.5 text-sm transition-all border-l-2 " + (cfg.display.type === d.id ? "bg-emerald-500/10 text-emerald-400 border-emerald-500" : "text-zinc-400 hover:bg-zinc-800 hover:text-zinc-200 border-transparent")}>
                    <span className="font-mono text-xs text-zinc-600 mr-2">{d.id}</span>{d.label}
                  </button>
                ))}
              </div>);
            })}
          </div>
          <div className="grid grid-cols-2 gap-4">
            <SelectBox label="Rotation" value={String(cfg.display.rotation)} onChange={(v) => update("display.rotation", Number(v))}
              options={[{ id: "0", label: "0 deg" }, { id: "90", label: "90 deg" }, { id: "180", label: "180 (default)" }, { id: "270", label: "270 deg" }]} />
            <div className="flex items-end pb-1"><Toggle checked={cfg.invert} onChange={(v) => update("invert", v)} label="Invert" desc="White bg" /></div>
          </div>
          <div className="bg-zinc-900/50 rounded-xl p-3 border border-zinc-800">
            <span className="text-zinc-500 text-xs">Selected: </span><span className="font-mono text-emerald-400 text-sm">{cfg.display.type}</span>
          </div>
        </div>)}
      </div>
    );
    // WHITELIST
    if (step === 2) return (
      <div className="space-y-5">
        <div><h2 className="text-xl font-bold text-zinc-100 mb-1">Network Whitelist</h2><p className="text-zinc-500 text-sm">Networks your pwnagotchi will never attack. Add your home WiFi, phone hotspot, and anything you want to protect.</p></div>
        <div className="flex gap-2">
          <input value={whitelistInput} onChange={(e) => setWhitelistInput(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") addWL(); }}
            placeholder="SSID or MAC address..." className="flex-1 bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 text-sm text-zinc-200 placeholder-zinc-600 focus:outline-none focus:border-emerald-500 transition-all font-mono" />
          <button onClick={addWL} className="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-medium rounded-lg transition-colors">Add</button>
        </div>
        {cfg.whitelist.length > 0 && <div className="space-y-1">{cfg.whitelist.map((w, i) => (
          <div key={i} className="flex items-center justify-between bg-zinc-900/50 border border-zinc-800 rounded-lg px-3 py-2">
            <span className="font-mono text-sm text-zinc-300">{w}</span>
            <button onClick={() => update("whitelist", cfg.whitelist.filter((_, j) => j !== i))} className="text-red-400 hover:text-red-300 text-xs font-medium">Remove</button>
          </div>
        ))}</div>}
        <div className="bg-zinc-900/30 border border-zinc-800 rounded-xl p-4">
          <p className="text-zinc-400 text-xs font-bold uppercase tracking-wider mb-3">Accepted Formats</p>
          <div className="space-y-2">{WHITELIST_EXAMPLES.map((ex) => (
            <div key={ex.value} className="flex items-start gap-3 bg-zinc-900/50 border border-zinc-800 rounded-lg px-3 py-2">
              <span className="font-mono text-sm text-zinc-500 shrink-0">{ex.value}</span>
              <span className="text-zinc-600 text-xs">{ex.desc}</span>
            </div>
          ))}</div>
        </div>
        <div className="bg-amber-500/10 border border-amber-500/30 rounded-xl p-3">
          <p className="text-amber-400 text-xs"><strong>Important:</strong> Always whitelist your home network. Your pwnagotchi will deauth and capture handshakes on everything NOT in this list.</p>
        </div>
      </div>
    );
    // PERSONALITY
    if (step === 3) return (
      <div className="space-y-5">
        <div><h2 className="text-xl font-bold text-zinc-100 mb-1">Personality</h2><p className="text-zinc-500 text-sm">Defaults work well. Auto-tune handles channels at runtime.</p></div>
        <Toggle checked={cfg.personality.deauth} onChange={(v) => update("personality.deauth", v)} label="Deauthentication" desc="Deauth frames for full WPA handshakes" />
        <Toggle checked={cfg.personality.associate} onChange={(v) => update("personality.associate", v)} label="Association" desc="Association frames for PMKIDs" />
        <Toggle checked={cfg.personality.advertise} onChange={(v) => update("personality.advertise", v)} label="Mesh Advertising" desc="Visible to nearby pwnagotchis" />
        <div className="grid grid-cols-2 gap-4">
          <Tip label="Recon Time (s)" tip="How long pwnagotchi spends scanning on each channel before deciding what to attack. Higher = more thorough but slower.">
            <NumInput value={cfg.personality.recon_time} onChange={(v) => update("personality.recon_time", v)} min={5} max={120} />
          </Tip>
          <Tip label="Hop Recon (s)" tip="How long to listen on each channel while hopping. Lower = faster scanning across channels, higher = better chance of catching traffic on each one.">
            <NumInput value={cfg.personality.hop_recon_time} onChange={(v) => update("personality.hop_recon_time", v)} min={1} max={60} />
          </Tip>
          <Tip label="Min RSSI" tip="Minimum signal strength to bother attacking. -200 = attack everything regardless of distance. -70 = only attack nearby strong signals.">
            <NumInput value={cfg.personality.min_rssi} onChange={(v) => update("personality.min_rssi", v)} min={-200} max={0} />
          </Tip>
          <Tip label="Max Interactions" tip="Maximum number of deauth/associate attempts per access point per epoch. Higher = more aggressive but noisier.">
            <NumInput value={cfg.personality.max_interactions} onChange={(v) => update("personality.max_interactions", v)} min={1} max={20} />
          </Tip>
          <Tip label="AP TTL (s)" tip="Access Point Time-To-Live. How long (seconds) pwnagotchi remembers a seen access point before forgetting it.">
            <NumInput value={cfg.personality.ap_ttl} onChange={(v) => update("personality.ap_ttl", v)} min={30} max={600} />
          </Tip>
          <Tip label="STA TTL (s)" tip="Station (client) Time-To-Live. How long (seconds) pwnagotchi remembers a WiFi client device.">
            <NumInput value={cfg.personality.sta_ttl} onChange={(v) => update("personality.sta_ttl", v)} min={30} max={600} />
          </Tip>
        </div>
        <div>
          <label className="text-zinc-400 text-xs uppercase tracking-wider font-semibold">Channels</label>
          <p className="text-zinc-600 text-xs mb-2">Empty = all channels. Click to focus specific ones.</p>
          <p className="text-zinc-600 text-xs mb-1 font-semibold">2.4 GHz</p>
          <div className="flex flex-wrap gap-1.5 mb-3">{CHANNELS_2G.map((ch) => (
            <button key={ch} onClick={() => toggleCh(ch)} className={"px-2 py-1 text-xs font-mono rounded transition-all " + (cfg.personality.channels.indexOf(ch) >= 0 ? "bg-emerald-500/20 text-emerald-400 border border-emerald-500/40" : "bg-zinc-900 text-zinc-600 border border-zinc-800 hover:border-zinc-600")}>{ch}</button>
          ))}</div>
          <p className="text-zinc-600 text-xs mb-1 font-semibold">5 GHz</p>
          <div className="flex flex-wrap gap-1.5">{CHANNELS_5G.map((ch) => (
            <button key={ch} onClick={() => toggleCh(ch)} className={"px-2 py-1 text-xs font-mono rounded transition-all " + (cfg.personality.channels.indexOf(ch) >= 0 ? "bg-emerald-500/20 text-emerald-400 border border-emerald-500/40" : "bg-zinc-900 text-zinc-600 border border-zinc-800 hover:border-zinc-600")}>{ch}</button>
          ))}</div>
          {cfg.personality.channels.length > 0 && <p className="text-emerald-400/60 text-xs mt-2 font-mono">[{cfg.personality.channels.join(", ")}]</p>}
        </div>
      </div>
    );
    // PLUGINS
    if (step === 4) {
      const groups = ["Core", "Maintenance", "GPS", "Cracking", "WiGLE", "Cloud", "Hardware"];
      const uncategorised = Object.keys(cfg.plugins).filter((n) => { const m = PLUGIN_META[n]; return !m || (!groups.includes(m.group) && m.group !== "hidden"); });
      return (
        <div className="space-y-2">
          <div><h2 className="text-xl font-bold text-zinc-100 mb-1">Plugins</h2><p className="text-zinc-500 text-sm">Toggle plugins and configure their settings. Synced from GitHub defaults.toml</p></div>
          <div className="flex items-center justify-between bg-zinc-900/50 rounded-lg px-3 py-2 border border-zinc-800">
            <div className="flex items-center gap-2">
              <span className={"w-2 h-2 rounded-full " + (syncStatus === "synced" ? "bg-emerald-500" : syncStatus === "cached" ? "bg-blue-500" : syncStatus === "fetching" ? "bg-yellow-500 animate-pulse" : "bg-zinc-600")} />
              <span className="text-zinc-500 text-xs">
                {syncStatus === "synced" && "Synced from GitHub"}
                {syncStatus === "cached" && "Cached"}
                {syncStatus === "fetching" && "Syncing..."}
                {syncStatus === "offline" && "Using built-in defaults"}
                {syncStatus === "loading" && "Loading..."}
                {lastSynced && <span className="text-zinc-600 ml-1">({lastSynced.toLocaleDateString()})</span>}
              </span>
            </div>
            <button onClick={fetchFromGitHub} className="text-zinc-600 hover:text-emerald-400 text-xs transition-colors">Refresh</button>
          </div>
          {groups.map((group) => {
            const plugs = getPluginsByGroup(group);
            if (plugs.length === 0) return null;
            return (<div key={group}><Section title={group} />{plugs.map(renderPluginToggle)}</div>);
          })}
          {uncategorised.length > 0 && <div><Section title="Other" />{uncategorised.map(renderPluginToggle)}</div>}
        </div>
      );
    }
    // WEB UI
    if (step === 5) return (
      <div className="space-y-5">
        <div><h2 className="text-xl font-bold text-zinc-100 mb-1">Web UI</h2><p className="text-zinc-500 text-sm">Runs on port 8080. Access via USB or ethernet.</p></div>
        <Toggle checked={cfg.web.auth} onChange={(v) => update("web.auth", v)} label="Enable Authentication" desc="Require login for web UI" />
        {cfg.web.auth && (<div className="space-y-4">
          <div className="grid grid-cols-2 gap-4">
            <TextInput label="Username" value={cfg.web.username} onChange={(v) => update("web.username", v)} placeholder="admin" />
            <TextInput label="Password" value={cfg.web.password} onChange={(v) => update("web.password", v)} placeholder="changeme" type="password" />
          </div>
          <div className="bg-amber-500/10 border border-amber-500/30 rounded-xl p-3"><p className="text-amber-400 text-xs"><strong>Change the defaults!</strong> Anyone on your network can access the web UI on port 8080.</p></div>
        </div>)}
      </div>
    );
    // GENERATE
    if (step === 6) return (
      <div className="space-y-5">
        <div><h2 className="text-xl font-bold text-zinc-100 mb-1">Your Config</h2><p className="text-zinc-500 text-sm">Complete config ready to use.</p></div>

        {/* ── Validator ── */}
        <ValidatorPanel
          cfg={cfg}
          errorsAcknowledged={errorsAcknowledged}
          onDismissErrors={() => setErrorsAcknowledged(true)}
        />

        {/* Config preview */}
        <div className="bg-zinc-950 border border-zinc-800 rounded-xl overflow-hidden">
          <div className="flex items-center justify-between px-3 py-2 bg-zinc-900 border-b border-zinc-800">
            <span className="text-zinc-500 text-xs font-mono">config.toml</span>
            <button
              onClick={doCopy}
              disabled={!canProceed}
              className={"text-xs transition-colors " + (canProceed ? "text-zinc-500 hover:text-zinc-300" : "text-zinc-700 cursor-not-allowed")}>
              {copied ? "Copied!" : canProceed ? "Copy" : "Fix issues to copy"}
            </button>
          </div>
          <pre className="p-4 text-xs font-mono text-emerald-400/80 overflow-x-auto max-h-64 overflow-y-auto leading-relaxed whitespace-pre-wrap">{toml}</pre>
        </div>

        {/* Action buttons */}
        <div className="grid grid-cols-2 gap-3">
          <button
            onClick={doWriteToBoot}
            disabled={!canProceed}
            className={"w-full py-3 font-bold rounded-xl transition-colors text-sm " + (!canProceed ? "bg-zinc-800 text-zinc-600 cursor-not-allowed" : writeStatus === "done" ? "bg-emerald-600 text-white" : writeStatus === "writing" ? "bg-zinc-700 text-zinc-400" : "bg-blue-600 hover:bg-blue-500 text-white")}>
            {!canProceed ? "Resolve issues first" : writeStatus === "writing" ? "Select boot partition..." : writeStatus === "done" ? "Written to SD!" : writeStatus === "error" ? "Write failed" : writeStatus === "unsupported" ? "Not supported (use Download)" : "Write to SD Card"}
          </button>
          <button
            onClick={doDownload}
            disabled={!canProceed}
            className={"w-full py-3 font-bold rounded-xl transition-colors text-sm " + (canProceed ? "bg-emerald-600 hover:bg-emerald-500 text-white" : "bg-zinc-800 text-zinc-600 cursor-not-allowed")}>
            {canProceed ? "Download config.toml" : "Resolve issues first"}
          </button>
        </div>

        {writeStatus === "done" && (
          <div className="bg-emerald-500/10 border border-emerald-500/30 rounded-xl p-3">
            <p className="text-emerald-400 text-xs"><strong>config.toml written!</strong> Safely eject the SD card, insert into your Pi, and boot.</p>
          </div>
        )}
        {writeStatus === "unsupported" && (
          <div className="bg-amber-500/10 border border-amber-500/30 rounded-xl p-3">
            <p className="text-amber-400 text-xs"><strong>Browser not supported.</strong> Write to SD requires Chrome or Edge. Use Download instead.</p>
          </div>
        )}

        {showPwnstore && (
          <a href="https://pwnstore.org/" target="_blank" rel="noopener noreferrer"
            className="block bg-emerald-500/10 border border-emerald-500/30 rounded-xl p-4 hover:bg-emerald-500/20 hover:border-emerald-400/50 transition-all group">
            <div className="flex items-center justify-between">
              <div>
                <p className="text-emerald-400 text-sm font-bold group-hover:text-emerald-300">(◕‿‿◕) Config saved! Now grab some plugins</p>
                <p className="text-zinc-500 text-xs mt-1">Visit PwnStore to browse and install community plugins</p>
              </div>
              <span className="text-emerald-500/50 group-hover:text-emerald-400 text-lg">→</span>
            </div>
          </a>
        )}

        {/* Install instructions */}
        <div className="bg-zinc-900/50 border border-zinc-800 rounded-xl p-4 space-y-1">
          <p className="text-zinc-400 text-xs font-bold uppercase tracking-wider">How this works</p>
          <p className="text-zinc-600 text-xs">This generates a complete config. Pwnagotchi loads defaults.toml first, then merges your config.toml on top.</p>
        </div>
        <div className="bg-emerald-500/5 border border-emerald-500/20 rounded-xl p-4 space-y-2">
          <div className="flex items-center gap-2">
            <span className="bg-emerald-500/20 text-emerald-400 text-xs font-bold px-2 py-0.5 rounded">RECOMMENDED</span>
            <p className="text-zinc-300 text-xs font-bold uppercase tracking-wider">Boot Partition (v2.9.5.4+)</p>
          </div>
          <div className="space-y-1.5 text-zinc-400 text-xs font-mono">
            <p>1. Flash pwnagotchi image to SD card with rpi-imager</p>
            <p>2. Re-insert SD card into your computer</p>
            <p>3. Click <span className="text-blue-400 font-bold">Write to SD Card</span> above and select the <span className="text-emerald-400">boot</span> / <span className="text-emerald-400">bootfs</span> partition</p>
            <p className="text-zinc-600">   Or manually copy the downloaded config.toml to the boot partition</p>
            <p>4. Safely eject SD card, insert into Pi, and boot (first boot 2-3 min)</p>
          </div>
          <p className="text-zinc-600 text-xs">Pwnagotchi auto-detects config on /boot/firmware/ and moves it to /etc/pwnagotchi/config.toml on first boot.</p>
        </div>
        <div className="bg-zinc-900/50 border border-zinc-800 rounded-xl p-4 space-y-2">
          <p className="text-zinc-400 text-xs font-bold uppercase tracking-wider">SSH Method (v2.9.5.4+)</p>
          <div className="space-y-1.5 text-zinc-500 text-xs font-mono">
            <p>1. Connect Pi via USB data cable (port closest to HDMI on Zero/Zero2)</p>
            <p>2. Wait 2-3 minutes for first boot</p>
            <p>3. <span className="text-emerald-400">ssh pi@pwnagotchi.local</span></p>
            <p>4. Password: <span className="text-zinc-300">raspberry</span></p>
            <p>5. <span className="text-emerald-400">scp config.toml pi@pwnagotchi.local:/etc/pwnagotchi/config.toml</span></p>
            <p>6. Restart: <span className="text-emerald-400">pwnkill</span></p>
          </div>
        </div>
        <div className="bg-zinc-900/50 border border-zinc-800 rounded-xl p-4 space-y-2">
          <p className="text-zinc-400 text-xs font-bold uppercase tracking-wider">SSH Method (Pre-2.9.5.4)</p>
          <div className="space-y-1.5 text-zinc-500 text-xs font-mono">
            <p>1. Connect Pi via USB data cable</p>
            <p>2. Set your computer's USB network IP to <span className="text-zinc-300">10.0.0.1</span></p>
            <p>3. <span className="text-emerald-400">ssh pi@10.0.0.2</span> — Password: <span className="text-zinc-300">raspberry</span></p>
            <p>4. <span className="text-emerald-400">scp config.toml pi@10.0.0.2:/etc/pwnagotchi/config.toml</span></p>
            <p>5. Restart: <span className="text-emerald-400">sudo systemctl restart pwnagotchi</span></p>
          </div>
          <p className="text-zinc-600 text-xs">Consider upgrading to v2.9.5.4+ for much easier setup!</p>
        </div>
      </div>
    );
    return null;
  };

  // ── Layout ─────────────────────────────────────────────────────────
  // Show validation badge on Generate nav pip if there are issues
  const { errors: liveErrors, warnings: liveWarnings } = useMemo(() => validateConfig(cfg), [cfg]);
  const hasIssues = liveErrors.length > 0 || liveWarnings.length > 0;

  return (
    <div className="min-h-screen bg-zinc-950 text-zinc-200">
      <div className="max-w-xl mx-auto px-4 py-6">
        <div className="text-center mb-2">
          <div style={{fontFamily: "'Arial', sans-serif", fontSize: "2.8rem", color: "#e0e0e0", textShadow: "0 0 15px rgba(0,255,0,0.3)", marginBottom: "2px"}}>
            (◕‿‿◕)
          </div>
          <h1 style={{fontFamily: "'VT323', monospace", fontWeight: 400, margin: 0, fontSize: "3rem", color: "#fff", lineHeight: 0.9, textTransform: "uppercase", letterSpacing: "2px"}}>
            Pwn<span style={{color: "#00FF00"}}>Config</span>
          </h1>
          <p style={{color: "#888", fontSize: "0.85rem", marginTop: "6px", letterSpacing: "1px", textTransform: "uppercase", fontWeight: 500}}>Config Generator</p>
          <div style={{marginTop: "8px", fontSize: "0.85rem", color: "#00FF00", fontWeight: 500}}>
            Built by <a href="https://github.com/wpa-2" target="_blank" style={{color: "#00FF00"}}>WPA2</a> &bull; <a href="https://buymeacoffee.com/wpa2" target="_blank" style={{color: "#00FF00"}}>☕ Buy me a coffee</a>
          </div>
        </div>

        <nav className="pwn-nav">
          <a href="index.html" className="pwn-nav-link">[PWNSTORE]</a>
          <a href="troubleshoot.html" className="pwn-nav-link">[TROUBLESHOOT]</a>
          <a href="socials.html" className="pwn-nav-link">[SOCIALS]</a>
        </nav>

        {/* Progress pips */}
        <div className="flex items-center gap-1 mb-1 px-1">
          {STEP_NAMES.map((s, i) => (
            <button key={s} onClick={() => setStep(i)} title={s}
              className={"flex-1 rounded-full transition-all " + (i <= step ? (i === 6 && hasIssues && !errorsAcknowledged ? "bg-amber-500" : "bg-emerald-500") : "bg-zinc-800") + (i === step ? " h-2" : " h-1.5")} />
          ))}
        </div>
        {/* Step labels */}
        <div className="flex items-center gap-1 mb-5 px-1">
          {STEP_NAMES.map((s, i) => (
            <div key={s} className="flex-1 text-center">
              {i === step && <span className={"text-xs font-medium " + (i === 6 && hasIssues && !errorsAcknowledged ? "text-amber-400" : "text-zinc-500")}>{s}</span>}
            </div>
          ))}
        </div>

        <div className="bg-zinc-900/40 border border-zinc-800/80 rounded-2xl p-5 min-h-96">{renderContent()}</div>

        <div className="flex justify-between mt-4 gap-3">
          <button onClick={() => setStep(Math.max(0, step - 1))} disabled={step === 0}
            className={"px-5 py-2.5 rounded-xl text-sm font-medium transition-all " + (step === 0 ? "text-zinc-700 cursor-not-allowed" : "text-zinc-400 hover:text-zinc-200 bg-zinc-900 hover:bg-zinc-800 border border-zinc-800")}>Back</button>
          <button onClick={doRestart}
            className={"px-5 py-2.5 rounded-xl text-sm font-medium transition-all border " + (confirmRestart ? "text-red-400 bg-red-500/10 border-red-500/40 hover:bg-red-500/20" : "text-amber-400 hover:text-amber-300 bg-zinc-900 hover:bg-zinc-800 border-zinc-800 hover:border-amber-500/30")}>{confirmRestart ? "Sure? Click again" : "Restart"}</button>
          {step < STEP_NAMES.length - 1
            ? <button onClick={() => setStep(step + 1)} className="px-5 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-bold rounded-xl transition-colors">Next</button>
            : <button onClick={doDownload} disabled={!canProceed}
                className={"px-5 py-2.5 text-sm font-bold rounded-xl transition-colors " + (canProceed ? "bg-emerald-600 hover:bg-emerald-500 text-white" : "bg-zinc-800 text-zinc-600 cursor-not-allowed")}>Download</button>
          }
        </div>
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(PwnConfig));
  </script>
</body>
</html>
